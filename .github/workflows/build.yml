name: build-e-deploy

on:
  push:
    branches: [main] # ogni modifica a codice/design su main → deploy immediato
  schedule:
    # Il MIMIT pubblica verso le 08:45 ora italiana. Proviamo ogni 15 minuti in una
    # finestra ampia: il "gate" fa il deploy solo quando il CSV è più recente di quello
    # online, quindi finché non ci riesce (dati non ancora usciti, o deploy fallito)
    # ritenta ogni 15 min; appena riesce, i tentativi successivi sono no-op. In UTC
    # l'orario del MIMIT scivola di 1h tra ora legale e solare (il cron è sempre UTC).
    - cron: '*/15 6-13 * * *' # ogni 15 min, 06:00–13:59 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Forza rebuild+deploy anche se i dati non sono cambiati'
        type: boolean
        default: false

concurrency:
  group: build-deploy
  cancel-in-progress: false

env:
  # Serve al gate per confrontare i dati online con la sorgente.
  SITE_URL: 'https://carburante.pages.dev'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # esecuzione diretta dei .ts (type stripping)

      # Il gate gira PRIMA di npm ci: should-build.ts usa solo Node, niente
      # dipendenze. Così i tentativi ogni 15 min che non devono pubblicare
      # costano pochi secondi (checkout + node), non un intero npm ci.
      - id: gate
        name: Serve ricostruire?
        run: |
          # Push o force → sempre (una modifica di codice deve pubblicare).
          # Schedulazione → solo se il CSV è più recente di quello online.
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "Evento '${{ github.event_name }}': build sempre."
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            node scripts/should-build.ts
          fi

      - name: Installa le dipendenze
        if: steps.gate.outputs.build == 'true'
        run: npm ci

      - name: Scarica i CSV MIMIT (con retry)
        if: steps.gate.outputs.build == 'true'
        run: |
          for i in 1 2 3; do
            npm run fetch-data && exit 0
            echo "::warning::fetch-data fallito (tentativo $i), ritento tra 20s…"; sleep 20
          done
          exit 1

      - name: Costruisci le tessere
        if: steps.gate.outputs.build == 'true'
        run: npm run build-tiles

      - name: Deploy su Cloudflare Pages (con retry)
        if: steps.gate.outputs.build == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for i in 1 2 3; do
            npx wrangler pages deploy --branch main && exit 0
            echo "::warning::deploy fallito (tentativo $i), ritento tra 15s…"; sleep 15
          done
          exit 1
