name: build-e-deploy

on:
  schedule:
    # Il MIMIT pubblica verso le 08:45 ora italiana (media recente). Primo tentativo
    # ~09:00 IT, poi ogni ora, finché il file del giorno non compare. In UTC l'orario
    # scivola di 1h tra ora legale e solare, e il cron di GitHub è sempre UTC: per
    # questo copriamo un intervallo e il "gate" fa il deploy solo quando il file è fresco.
    - cron: '0 7-13 * * *' # ogni ora, 07:00–13:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Forza rebuild+deploy anche se i dati non sono cambiati'
        type: boolean
        default: false

concurrency:
  group: build-deploy
  cancel-in-progress: false

env:
  # Serve al gate per confrontare i dati online con la sorgente.
  SITE_URL: 'https://carburante.pages.dev'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # esecuzione diretta dei .ts (type stripping)
      - run: npm ci

      - id: gate
        name: Il CSV è più recente di quello online?
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force attivo: salto il controllo."
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            node scripts/should-build.ts
          fi

      - name: Scarica i CSV MIMIT
        if: steps.gate.outputs.build == 'true'
        run: npm run fetch-data

      - name: Costruisci le tessere
        if: steps.gate.outputs.build == 'true'
        run: npm run build-tiles

      - name: Deploy su Cloudflare Pages
        if: steps.gate.outputs.build == 'true'
        run: npx wrangler pages deploy --branch main
        env:
          # Token con permesso "Cloudflare Pages: Edit" + l'Account ID.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
