<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b7285" />
  <title>carburante — distributori vicini ed economici</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <style>
    :root {
      --bg: #f7f7f5; --card: #fff; --fg: #1a1a1a; --muted: #666;
      --line: #e3e3e0; --accent: #0b7285; --accent-fg: #fff; --best: #2b8a3e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16181c; --card: #22252b; --fg: #eceef1; --muted: #9aa1ab;
        --line: #333842; --accent: #38b2c4; --accent-fg: #06232a; --best: #51cf66;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 16px/1.5 system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg); padding: 1rem;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: .3rem 0 .1rem; }
    .sub { color: var(--muted); margin: 0 0 1.2rem; font-size: .9rem; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .3rem; }
    input, select, button { font: inherit; }
    input[type=text] {
      width: 100%; padding: .6rem .7rem; border: 1px solid var(--line);
      border-radius: 8px; background: var(--bg); color: var(--fg);
    }
    .row { display: flex; gap: .6rem; }
    .row > * { flex: 1; }
    button {
      padding: .6rem .9rem; border: 0; border-radius: 8px; cursor: pointer;
      background: var(--accent); color: var(--accent-fg); font-weight: 600;
    }
    button.ghost {
      display: block; width: 100%; margin: .3rem 0; background: transparent;
      color: var(--fg); border: 1px solid var(--line); font-weight: 400; text-align: left;
    }
    button.ghost:hover { border-color: var(--accent); }
    select { width: 100%; padding: .55rem; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); }

    /* selettore modalità */
    .modes { display: flex; gap: .4rem; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: .3rem; margin-bottom: 1rem; }
    .modes button { flex: 1; background: transparent; color: var(--fg); font-weight: 600; border-radius: 7px; }
    .modes button.active { background: var(--accent); color: var(--accent-fg); }

    /* chip dei percorsi */
    #routeChips { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .8rem; }
    .chip { flex: 1 1 45%; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; gap: .1rem;
      background: var(--bg); border: 1px solid var(--line); color: var(--fg); border-radius: 9px; padding: .5rem .7rem; font-weight: 400; text-align: left; }
    .chip.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .chip b { font-size: .88rem; }
    .chip span { color: var(--muted); font-size: .78rem; }
    #findRoutes { width: 100%; margin-top: .8rem; }
    #findRoutes:disabled { opacity: .45; cursor: default; }

    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .6rem; margin-bottom: .8rem; }
    ul { list-style: none; margin: 0; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: baseline; padding: .55rem 0; border-bottom: 1px solid var(--line); gap: .6rem; }
    li:last-child { border-bottom: 0; }
    .price { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 1.05rem; }
    li.best .price { color: var(--best); }
    .meta { color: var(--fg); font-size: .9rem; }
    .addr { color: var(--muted); font-size: .8rem; margin-top: .1rem; }
    .dist { color: var(--muted); font-size: .82rem; text-align: right; flex: 0 0 auto; }
    .status { color: var(--muted); font-size: .85rem; }

    /* toggle elenco/mappa + mappa */
    .viewtoggle { display: inline-flex; gap: .3rem; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: .2rem; margin-bottom: .6rem; }
    .viewtoggle button { padding: .3rem .8rem; background: transparent; color: var(--fg); font-weight: 600; font-size: .85rem; border-radius: 6px; }
    .viewtoggle button.active { background: var(--accent); color: var(--accent-fg); }
    #map { height: 60vh; min-height: 340px; border-radius: 10px; }
    .pricepin { background: var(--card); border: 1px solid var(--accent); color: var(--fg); border-radius: 6px; padding: 1px 4px; font: 700 12px/1.3 system-ui, sans-serif; white-space: nowrap; box-shadow: 0 1px 3px rgba(0,0,0,.35); text-align: center; }
    .pricepin.best { background: var(--best); color: #fff; border-color: var(--best); }
    .centerpin { font-size: 22px; line-height: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
    .leaflet-popup-content { font: 13px/1.45 system-ui, sans-serif; margin: .6rem .8rem; }
    .leaflet-popup-content a { color: #0b7285; font-weight: 600; }

    footer { color: var(--muted); font-size: .75rem; text-align: center; margin-top: 1.5rem; }
    a { color: var(--accent); }
  </style>
</head>
<body>
<main>
  <h1>⛽ carburante</h1>
  <p class="sub">I distributori più vicini ed economici. Dati Osservaprezzi MIMIT, <span id="extraction">—</span>.</p>

  <div class="modes">
    <button data-mode="single" class="active">Indirizzo</button>
    <button data-mode="route">Tragitto</button>
  </div>

  <!-- MODALITÀ INDIRIZZO -->
  <div class="card" id="singleCard">
    <label for="q">Indirizzo di partenza</label>
    <div class="row">
      <input id="q" type="text" placeholder="es. Via Roma 1, Milano" autocomplete="off" />
      <button id="go" style="flex:0 0 auto">Cerca</button>
    </div>
    <div id="candidates" style="margin-top:.7rem"></div>
  </div>

  <!-- MODALITÀ TRAGITTO -->
  <div class="card" id="routeCard" hidden>
    <label for="qa">Partenza</label>
    <div class="row">
      <input id="qa" type="text" placeholder="es. Milano" autocomplete="off" />
      <button id="goA" style="flex:0 0 auto">Cerca</button>
    </div>
    <div id="candA" style="margin-top:.5rem"></div>

    <label for="qb" style="margin-top:.9rem">Arrivo</label>
    <div class="row">
      <input id="qb" type="text" placeholder="es. Roma" autocomplete="off" />
      <button id="goB" style="flex:0 0 auto">Cerca</button>
    </div>
    <div id="candB" style="margin-top:.5rem"></div>

    <button id="findRoutes" disabled>Trova percorsi</button>
    <div id="routeChips"></div>
  </div>

  <!-- CONTROLLI + RISULTATI (condivisi) -->
  <div class="card" id="searchCard" hidden>
    <div class="controls">
      <div>
        <label for="fuel">Carburante</label>
        <select id="fuel">
          <option value="gasolio">Gasolio</option>
          <option value="benzina">Benzina</option>
          <option value="gpl">GPL</option>
          <option value="metano">Metano</option>
          <option value="gasolio_plus">Gasolio premium</option>
          <option value="benzina_plus">Benzina premium</option>
          <option value="hvo">HVO</option>
          <option value="gnl">GNL</option>
        </select>
      </div>
      <div>
        <label for="mode">Modalità</label>
        <select id="mode">
          <option value="s">Self</option>
          <option value="r">Servito</option>
        </select>
      </div>
      <div>
        <label for="radius" id="radiusLabel">Raggio</label>
        <select id="radius">
          <option value="1">1 km</option>
          <option value="3">3 km</option>
          <option value="5" selected>5 km</option>
          <option value="10">10 km</option>
          <option value="20">20 km</option>
          <option value="30">30 km</option>
        </select>
      </div>
    </div>
    <p class="status" id="status"></p>
    <div class="viewtoggle">
      <button data-view="list" class="active">Elenco</button>
      <button data-view="map">Mappa</button>
    </div>
    <ul id="results"></ul>
    <div id="map" hidden></div>
  </div>

  <footer>
    Prezzi comunicati dai gestori al MIMIT · geocoding © OpenStreetMap/Nominatim · percorsi © openrouteservice.org
  </footer>
</main>

<script src="/vendor/leaflet/leaflet.js"></script>
<script type="module" src="/app.js"></script>
</body>
</html>
